name: motor_frontend
description: Predictive Maintenance Dashboard — INVT GD200A VFD Control
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & WebSocket
  http: ^1.2.1
  web_socket_channel: ^2.4.5

  # State Management
  provider: ^6.1.2

  # UI / Charts
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

  # Utilities
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  logger: ^2.3.0
  path_provider: ^2.1.3
  url_launcher: ^6.2.5
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
